<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
    <title>Pokédex OS</title>
    <style>
        :root { 
            --p-red: #d32f2f; --p-dark: #b71c1c; 
            --bg-color: #121212; --panel-bg: #1e1e1e;
        }
        
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* Using dvh fixes the Safari bottom-bar clipping issue */
        body, html { 
            margin: 0; padding: 0; height: 100dvh; width: 100vw;
            background: var(--bg-color); font-family: 'SF Pro Display', -apple-system, sans-serif;
            overflow: hidden; color: white;
        }

        .app-container {
            height: 100%; display: flex; flex-direction: column;
            background: linear-gradient(180deg, var(--p-dark) 0%, var(--p-red) 15%, var(--bg-color) 40%);
            padding-top: env(safe-area-inset-top);
            position: relative;
        }

        /* Tighter, Cleaner Header */
        .header {
            display: flex; align-items: center; padding: 10px 20px; gap: 15px;
            z-index: 10;
        }
        .big-blue {
            width: 45px; height: 45px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #a2defc, #29a5e3, #084a70);
            border: 3px solid #fff; box-shadow: 0 0 15px rgba(41, 165, 227, 0.6);
        }
        .led-group { display: flex; gap: 6px; }
        .led { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #000; box-shadow: inset 1px 1px 3px rgba(255,255,255,0.6); }
        .led.red { background: radial-gradient(circle at 30% 30%, #ff8a8a, #ff0000); }
        .led.yellow { background: radial-gradient(circle at 30% 30%, #ffe68a, #ffcc00); }
        .led.green { background: radial-gradient(circle at 30% 30%, #8aff8a, #00ff00); }
        .blink { animation: blinker 0.3s linear infinite; }
        @keyframes blinker { 50% { filter: brightness(2); box-shadow: 0 0 10px currentColor; } }

        /* Main Visual Area */
        .visual-display {
            flex: 0 0 45%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; padding: 0 20px; margin-top: -10px;
        }
        
        .identity { text-align: center; margin-bottom: 10px; z-index: 2; }
        #poke-id { font-size: 16px; color: rgba(255,255,255,0.7); font-weight: 800; letter-spacing: 2px;}
        #poke-name { font-size: 36px; font-weight: 900; margin: -5px 0 5px 0; text-transform: uppercase; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .tags { display: flex; gap: 8px; justify-content: center; }
        .tag { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 800; text-transform: uppercase; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        .img-container {
            height: 200px; width: 100%; display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 2;
        }
        #bg-glow { position: absolute; width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%); z-index: 1; transition: background 0.5s;}
        #poke-sprite { height: 220px; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.6)); transition: opacity 0.3s, transform 0.3s; z-index: 2; }

        /* Thumb-Zone Controls */
        .toolbar {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            padding: 0 20px; z-index: 10; margin-top: 10px;
        }
        input { 
            grid-column: span 4; padding: 12px; border-radius: 12px; border: none; 
            font-size: 14px; text-align: center; font-weight: bold; background: rgba(255,255,255,0.1); 
            color: white; backdrop-filter: blur(5px); margin-bottom: 5px;
        }
        input::placeholder { color: rgba(255,255,255,0.5); }
        input:focus { outline: 2px solid var(--p-red); background: rgba(255,255,255,0.2); }
        
        button {
            padding: 12px 0; border: none; border-radius: 12px; background: var(--panel-bg); color: white;
            font-weight: 800; font-size: 12px; display: flex; flex-direction: column; align-items: center; gap: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.1s, background 0.2s;
        }
        button:active { transform: scale(0.95); background: #333; }
        .btn-icon { font-size: 18px; }

        /* Sliding Bottom Drawer (The Data Sheet) */
        .bottom-sheet {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 75dvh;
            background: var(--panel-bg); border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            transform: translateY(calc(100% - 90px)); /* Shows just the handle and basic info by default */
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; flex-direction: column; z-index: 20;
        }
        .bottom-sheet.open { transform: translateY(0); }
        
        .sheet-handle-area { padding: 15px; cursor: pointer; display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .handle { width: 40px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 5px; margin-bottom: 15px; }
        
        .quick-stats { display: flex; width: 100%; justify-content: space-around; color: #aaa; font-size: 12px; font-weight: 700; }
        .quick-stats span { display: flex; flex-direction: column; align-items: center; gap: 2px;}
        .quick-stats strong { color: #fff; font-size: 14px; }

        .sheet-content { padding: 20px; overflow-y: auto; flex: 1; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        .sheet-content::-webkit-scrollbar { display: none; }

        /* Detail Typography */
        h3 { font-size: 14px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; margin: 25px 0 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;}
        h3:first-child { margin-top: 0; }
        
        .desc-text { font-size: 16px; line-height: 1.5; color: #eee; font-style: italic; border-left: 3px solid var(--p-red); padding-left: 15px; }
        
        .stat-row { display: flex; align-items: center; margin-bottom: 8px; }
        .stat-name { width: 50px; font-size: 10px; font-weight: 800; color: #888; text-transform: uppercase; }
        .stat-val { width: 30px; font-size: 12px; font-weight: bold; text-align: right; margin-right: 10px; }
        .stat-bar-bg { flex: 1; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
        .stat-bar-fill { height: 100%; width: 0%; border-radius: 3px; transition: width 1s ease-out; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .info-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; font-size: 12px; color: #aaa; }
        .info-box strong { display: block; color: #fff; font-size: 14px; margin-top: 4px; text-transform: capitalize;}
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="big-blue"></div>
        <div class="led-group">
            <div class="led red" id="led-red"></div>
            <div class="led yellow" id="led-yellow"></div>
            <div class="led green" id="led-green"></div>
        </div>
    </div>

    <div class="visual-display">
        <div class="identity">
            <div id="poke-id">#---</div>
            <div id="poke-name">LOADING</div>
            <div class="tags" id="types"></div>
        </div>
        
        <div class="img-container">
            <div id="bg-glow"></div>
            <img id="poke-sprite" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
        </div>
    </div>

    <div class="toolbar">
        <input type="text" id="search" placeholder="Search by Name or ID..." onkeydown="if(event.key==='Enter') loadPoke(this.value)">
        <button onclick="nav(-1)"><span class="btn-icon">◀</span> PREV</button>
        <button onclick="playCry()"><span class="btn-icon">💥</span> CRY</button>
        <button onclick="readAloud()"><span class="btn-icon">🎙️</span> VOICE</button>
        <button onclick="nav(1)"><span class="btn-icon">▶</span> NEXT</button>
        
        <button onclick="randomPoke()" style="grid-column: span 2; background: #2c2c2c;"><span class="btn-icon">🎲</span> RANDOM</button>
        <button onclick="toggleShiny()" style="grid-column: span 2; background: #2c2c2c;"><span class="btn-icon">✨</span> SHINY</button>
    </div>

    <div class="bottom-sheet" id="data-sheet">
        <div class="sheet-handle-area" onclick="toggleSheet()">
            <div class="handle"></div>
            <div class="quick-stats">
                <span>HT <strong id="ht">--</strong></span>
                <span>WT <strong id="wt">--</strong></span>
                <span>GENUS <strong id="genus">--</strong></span>
            </div>
        </div>
        
        <div class="sheet-content">
            <h3>Pokedex Entry</h3>
            <p class="desc-text" id="desc">Connecting to database...</p>

            <div class="info-grid">
                <div class="info-box">Abilities<br><strong id="abilities">--</strong></div>
                <div class="info-box">Base Exp<br><strong id="base-exp">--</strong></div>
            </div>

            <h3>Base Stats</h3>
            <div id="stats-area"></div>
        </div>
    </div>
</div>

<script>
    let curId = 25;
    let isShiny = false;
    let curData = null;
    let images = [];
    let imgIdx = 0;
    let timer = null;
    let cryAudio = null;

    const typeColors = {
        fire: '#fd7d24', water: '#4592c4', grass: '#9bcc50', electric: '#eed535',
        ice: '#51c4e7', fighting: '#d56723', poison: '#b97fc9', ground: '#ab9842',
        flying: '#3dc7ef', psychic: '#f366b9', bug: '#729f3f', rock: '#a38c21',
        ghost: '#7b62a3', dragon: '#f16e57', dark: '#707070', steel: '#9eb7b8',
        fairy: '#fdb9e9', normal: '#a4acaf'
    };

    // UI Interactions
    function toggleSheet() {
        document.getElementById('data-sheet').classList.toggle('open');
    }

    function setLEDs(active) {
        ['red', 'yellow', 'green'].forEach(c => {
            const el = document.getElementById(`led-${c}`);
            active ? el.classList.add('blink') : el.classList.remove('blink');
        });
    }

    // Core Logic
    async function loadPoke(idOrName) {
        if (!idOrName) return;
        clearInterval(timer);
        setLEDs(true);
        document.getElementById('search').blur(); // Dismiss mobile keyboard
        
        try {
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${idOrName.toString().toLowerCase()}`);
            if(!res.ok) throw "Not found";
            const data = await res.json();
            curData = data;
            curId = data.id;

            const sRes = await fetch(data.species.url);
            const sData = await sRes.json();

            updateUI(data, sData);
            setupGallery();

        } catch (e) {
            document.getElementById('poke-name').innerText = "NOT FOUND";
            document.getElementById('desc').innerText = "Database error. Please check spelling or ID.";
        }
        setTimeout(() => setLEDs(false), 500);
    }

    function updateUI(data, sData) {
        const primaryType = data.types[0].type.name;
        const color = typeColors[primaryType] || '#fff';
        
        document.getElementById('bg-glow').style.background = `radial-gradient(circle, ${color}66 0%, transparent 70%)`;

        document.getElementById('poke-id').innerText = `NO. ${data.id.toString().padStart(4, '0')}`;
        document.getElementById('poke-name').innerText = data.name;
        
        document.getElementById('ht').innerText = `${data.height / 10}m`;
        document.getElementById('wt').innerText = `${data.weight / 10}kg`;
        document.getElementById('base-exp').innerText = data.base_experience;

        const genusObj = sData.genera.find(g => g.language.name === 'en');
        document.getElementById('genus').innerText = genusObj ? genusObj.genus : "Unknown";

        const entry = sData.flavor_text_entries.find(e => e.language.name === 'en');
        document.getElementById('desc').innerText = entry ? entry.flavor_text.replace(/[\n\f]/g, ' ') : "No data.";

        document.getElementById('types').innerHTML = data.types.map(t => 
            `<span class="tag" style="background:${typeColors[t.type.name]}; color: ${['electric','ice','flying'].includes(t.type.name) ? '#000' : '#fff'}">${t.type.name}</span>`
        ).join('');

        document.getElementById('abilities').innerHTML = data.abilities.map(a => a.ability.name.replace('-', ' ')).join('<br>');

        // Stat Bars
        const maxStat = 255; // Blissey HP is highest base stat
        document.getElementById('stats-area').innerHTML = data.stats.map(s => {
            let statName = s.stat.name.toUpperCase().replace('SPECIAL-', 'SP. ');
            let percent = (s.base_stat / maxStat) * 100;
            let barColor = s.base_stat > 90 ? '#4caf50' : s.base_stat > 50 ? '#ffeb3b' : '#f44336';
            return `
                <div class="stat-row">
                    <div class="stat-name">${statName}</div>
                    <div class="stat-val">${s.base_stat}</div>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fill" style="width: ${percent}%; background: ${barColor}"></div>
                    </div>
                </div>
            `;
        }).join('');

        if(data.cries && data.cries.latest) { cryAudio = new Audio(data.cries.latest); }
    }

    function setupGallery() {
        images = [
            curData.sprites.other['official-artwork'].front_default,
            curData.sprites.front_default
        ].filter(i => i !== null);

        if(isShiny) {
            images = [
                curData.sprites.other['official-artwork'].front_shiny || curData.sprites.front_shiny,
                curData.sprites.front_shiny
            ].filter(i => i !== null);
        }

        imgIdx = 0;
        document.getElementById('poke-sprite').src = images[imgIdx];
        
        timer = setInterval(() => {
            imgIdx = (imgIdx + 1) % images.length;
            const el = document.getElementById('poke-sprite');
            el.style.transform = "scale(0.95)"; el.style.opacity = 0;
            setTimeout(() => {
                el.src = images[imgIdx];
                el.style.transform = "scale(1)"; el.style.opacity = 1;
            }, 300);
        }, 3500);
    }

    function toggleShiny() { isShiny = !isShiny; setupGallery(); }
    function nav(amt) { curId += amt; if(curId < 1) curId = 1; loadPoke(curId); }
    function randomPoke() { loadPoke(Math.floor(Math.random() * 1010) + 1); }
    
    function playCry() {
        if(cryAudio) { cryAudio.volume = 0.5; cryAudio.play(); }
    }

    function readAloud() {
        if (!curData) return;
        window.speechSynthesis.cancel();
        
        const name = curData.name;
        const genus = document.getElementById('genus').innerText;
        const desc = document.getElementById('desc').innerText;
        
        const text = `${name}. ${genus}. ${desc}`;
        const utter = new SpeechSynthesisUtterance(text);
        
        // This is the "Professor" tweak: deeper pitch, slightly slower rate
        utter.pitch = 0.5; 
        utter.rate = 0.9;
        
        window.speechSynthesis.speak(utter);
    }

    // Init
    window.onload = () => setTimeout(() => loadPoke(25), 300);
</script>

</body>
</html>
