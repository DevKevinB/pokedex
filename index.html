<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pokédex OS - UAT Phase 1</title>
    <style>
        :root { --p-primary: #d32f2f; --p-dark: #b71c1c; --bg-color: #121212; --panel-bg: #1e1e1e; }
        * { box-sizing: border-box; user-select: none; font-family: -apple-system, sans-serif; }
        body, html { margin: 0; padding: 0; height: 100dvh; width: 100vw; background: var(--bg-color); color: white; overflow: hidden; display: flex; flex-direction: column;}

        .header { display: flex; align-items: center; padding: env(safe-area-inset-top) 20px 10px; background: var(--p-dark); border-bottom: 3px solid #333;}
        .big-blue { width: 40px; height: 40px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #a2defc, #29a5e3); border: 3px solid #fff; box-shadow: 0 0 10px #29a5e3;}
        
        .visual-display { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(180deg, var(--p-primary) 0%, var(--bg-color) 80%); padding: 20px;}
        #poke-id { font-size: 18px; font-weight: 800; color: rgba(255,255,255,0.7); letter-spacing: 2px;}
        #poke-name { font-size: 36px; font-weight: 900; text-transform: uppercase; margin: 5px 0;}
        
        .img-container { height: 220px; width: 100%; display: flex; justify-content: center; align-items: center; margin: 20px 0;}
        #poke-sprite { height: 200px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5)); transition: opacity 0.3s;}

        .controls { display: flex; gap: 10px; padding: 20px; background: var(--panel-bg); }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; background: #333; color: white; font-weight: 900; font-size: 14px; cursor: pointer; }
        .btn:active { background: #555; }

        /* UAT DEBUG TERMINAL */
        #uat-console { background: #000; color: #00ff00; font-family: monospace; font-size: 10px; padding: 10px; height: 100px; overflow-y: auto; border-top: 2px solid #333; padding-bottom: env(safe-area-inset-bottom);}
        #uat-console p { margin: 2px 0; }
    </style>
</head>
<body>

    <div class="header">
        <div class="big-blue"></div>
        <h3 style="margin-left: 15px; font-weight: 900;">UAT DIAGNOSTIC BUILD</h3>
    </div>

    <div class="visual-display">
        <div id="poke-id">#---</div>
        <div id="poke-name">LOADING OS</div>
        <div class="img-container">
            <img id="poke-sprite" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="loadPoke(curId - 1)">◀ PREV</button>
        <button class="btn" style="background: #feca1b; color: #000;" onclick="loadPoke(Math.floor(Math.random() * 151) + 1)">🎲 RNDM</button>
        <button class="btn" onclick="loadPoke(curId + 1)">NEXT ▶</button>
    </div>

    <div id="uat-console">
        <p>[SYSTEM] Booting UAT Engine...</p>
    </div>

<script>
    let curId = 25;
    const maxPokemon = 151;

    // UAT Logger
    function logUAT(msg, isError = false) {
        const consoleEl = document.getElementById('uat-console');
        const color = isError ? '#ff0000' : '#00ff00';
        consoleEl.innerHTML += `<p style="color: ${color}">> ${msg}</p>`;
        consoleEl.scrollTop = consoleEl.scrollHeight; // Auto-scroll to bottom
    }

    // Catch global fatal errors
    window.onerror = function(message, source, lineno) {
        logUAT(`FATAL: ${message} (Line ${lineno})`, true);
    };

    async function loadPoke(id) {
        // Enforce Gen 1 limits safely
        if (id < 1) id = maxPokemon;
        if (id > maxPokemon) id = 1;
        curId = id;

        document.getElementById('poke-sprite').style.opacity = 0.2;
        logUAT(`--- INITIALIZING FETCH FOR ID: ${id} ---`);

        try {
            // 1. Fetch Primary Data
            logUAT(`Requesting API: /pokemon/${id}`);
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
            logUAT(`Network Response Status: ${res.status}`);
            
            if (!res.ok) throw new Error(`HTTP Error ${res.status}`);
            
            const data = await res.json();
            logUAT(`JSON Parsed successfully. Pokémon: ${data.name.toUpperCase()}`);

            // 2. Update UI
            logUAT(`Updating DOM elements...`);
            document.getElementById('id-text') ? document.getElementById('id-text').innerText = `#${data.id.toString().padStart(3, '0')}` : document.getElementById('poke-id').innerText = `#${data.id.toString().padStart(3, '0')}`;
            document.getElementById('poke-name').innerText = data.name;
            
            // 3. Load Image
            logUAT(`Injecting image sprite...`);
            const spriteUrl = data.sprites?.other?.['official-artwork']?.front_default || data.sprites?.front_default;
            if (!spriteUrl) logUAT(`WARNING: No sprite found for ${data.name}`, true);
            
            document.getElementById('poke-sprite').src = spriteUrl || 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png';
            document.getElementById('poke-sprite').style.opacity = 1;

            logUAT(`[SUCCESS] Rendering complete for ${data.name.toUpperCase()}.`);

        } catch (e) {
            logUAT(`[FAIL] Exception caught: ${e.message}`, true);
            document.getElementById('poke-name').innerText = "NETWORK ERROR";
        }
    }

    // Start App
    setTimeout(() => loadPoke(25), 500);
</script>

</body>
</html>
