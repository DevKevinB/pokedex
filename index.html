<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pokédex">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/188/188918.png">

    <title>Pokédex Pro</title>
    <style>
        :root {
            --p-red: #ff1c1c;
            --p-dark: #8b0000;
            --p-blue: #00ccff;
            --type-color: #232323;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; font-family: 'Helvetica Neue', sans-serif;
            overflow: hidden; color: white;
        }

        .pokedex-case {
            width: 100%; height: 100%;
            background: var(--p-red);
            display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top);
            box-sizing: border-box;
            border-left: 10px solid var(--p-dark);
        }

        /* Top Header */
        .header {
            padding: 10px 20px;
            display: flex; align-items: center; gap: 15px;
            background: linear-gradient(to bottom, var(--p-red), var(--p-dark));
            border-bottom: 4px solid black;
        }

        .big-blue-light {
            width: 50px; height: 50px;
            background: radial-gradient(circle at 30% 30%, #fff, var(--p-blue));
            border: 4px solid white; border-radius: 50%;
            box-shadow: 0 0 15px var(--p-blue);
        }

        /* The Internal Screen */
        .screen-outer {
            background: #dedede; margin: 15px; border-radius: 10px 10px 10px 50px;
            padding: 15px; flex-grow: 1; display: flex; flex-direction: column;
            border: 4px solid #444; box-shadow: inset 5px 5px 10px rgba(0,0,0,0.3);
        }

        #screen {
            background: var(--type-color); border-radius: 10px; flex-grow: 1;
            display: flex; flex-direction: column; align-items: center;
            padding: 15px; overflow-y: auto; transition: background 0.5s;
            border: 3px solid #222;
        }

        #poke-img { 
            width: 180px; height: 180px; 
            filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.5));
            transition: transform 0.3s;
        }

        .shiny-sparkle { position: absolute; top: 10px; right: 10px; font-size: 24px; display: none; }

        #name-plate {
            background: #333; color: #ffcc00; font-weight: 900;
            padding: 5px 20px; border-radius: 5px; font-size: 22px;
            margin: 10px 0; border: 2px solid #555; text-transform: uppercase;
        }

        /* Stats & Info */
        .info-row { display: flex; gap: 20px; margin-bottom: 10px; font-size: 14px; font-weight: bold;}
        
        .stats-box { width: 100%; }
        .stat-bar { background: rgba(255,255,255,0.2); height: 10px; border-radius: 5px; margin: 4px 0; overflow: hidden; }
        .fill { background: lime; height: 100%; width: 0%; transition: width 1s; }

        /* Controls */
        .keypad {
            background: var(--p-dark);
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        input {
            grid-column: span 3; padding: 15px; border-radius: 10px;
            border: none; font-size: 18px; text-align: center; font-weight: bold;
        }

        button {
            background: #333; color: white; border: none; padding: 15px 5px;
            border-radius: 10px; font-weight: bold; font-size: 12px;
            box-shadow: 0 4px #000; cursor: pointer;
        }

        button:active { transform: translateY(2px); box-shadow: 0 1px #000; }

        .btn-yellow { background: #ffcc00; color: black; }
        .btn-blue { background: var(--p-blue); color: black; }
        .btn-shiny { background: linear-gradient(45deg, #ff00ff, #ffee00); color: black; }
    </style>
</head>
<body>

<div class="pokedex-case">
    <div class="header">
        <div class="big-blue-light"></div>
        <div style="width:15px;height:15px;background:#ff1c1c;border-radius:50%;border:2px solid black"></div>
        <div style="width:15px;height:15px;background:#ffcc00;border-radius:50%;border:2px solid black"></div>
        <div style="width:15px;height:15px;background:#4caf50;border-radius:50%;border:2px solid black"></div>
    </div>

    <div class="screen-outer">
        <div id="screen">
            <div id="name-plate">#??? ???</div>
            <div style="position:relative">
                <div id="shiny-icon" class="shiny-sparkle">✨</div>
                <img id="poke-img" src="" alt="">
            </div>
            
            <div class="info-row">
                <span id="height">HT: --</span>
                <span id="weight">WT: --</span>
            </div>

            <div id="poke-desc" style="font-size: 12px; margin-bottom: 10px; font-style: italic;">...</div>

            <div class="stats-box" id="stats"></div>
        </div>
    </div>

    <div class="keypad">
        <input type="text" id="search" placeholder="NAME OR NUMBER" onkeydown="if(event.key==='Enter') loadPoke(this.value)">
        
        <button onclick="nav(-1)">⬅️ PREV</button>
        <button class="btn-blue" onclick="speak()">🔊 VOICE</button>
        <button onclick="nav(1)">NEXT ➡️</button>
        
        <button class="btn-shiny" onclick="toggleShiny()">✨ SHINY</button>
        <button class="btn-yellow" style="grid-column: span 2;" onclick="randomPoke()">RANDOM POKÉMON ❓</button>
    </div>
</div>

<script>
    let curId = 1;
    let isShiny = false;
    let currentData = null;
    let description = "";

    const typeColors = {
        fire: '#e62200', water: '#0073ff', grass: '#3fa129', electric: '#ffcc00',
        ice: '#00d4ff', fighting: '#82351f', poison: '#913991', ground: '#bf9926',
        flying: '#8295fe', psychic: '#ff42a1', bug: '#91a119', rock: '#a18719',
        ghost: '#5252a1', dragon: '#5200de', dark: '#423529', steel: '#828291',
        fairy: '#ff91ff', normal: '#a1a173'
    };

    async function loadPoke(idOrName) {
        try {
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${idOrName.toString().toLowerCase()}`);
            if(!res.ok) return;
            const data = await res.json();
            currentData = data;
            curId = data.id;

            const sRes = await fetch(data.species.url);
            const sData = await sRes.json();

            // Colors
            const mainType = data.types[0].type.name;
            document.getElementById('screen').style.backgroundColor = typeColors[mainType] || '#232323';

            // Details
            document.getElementById('name-plate').innerText = `#${data.id} ${data.name}`;
            document.getElementById('height').innerText = `HT: ${data.height / 10}m`;
            document.getElementById('weight').innerText = `WT: ${data.weight / 10}kg`;
            
            const entry = sData.flavor_text_entries.find(e => e.language.name === 'en');
            description = entry ? entry.flavor_text.replace(/[\n\f]/g, ' ') : "Data encrypted.";
            document.getElementById('poke-desc').innerText = description;

            // Stats
            document.getElementById('stats').innerHTML = data.stats.map(s => `
                <div style="font-size:9px; text-align:left">${s.stat.name.toUpperCase()}</div>
                <div class="stat-bar"><div class="fill" style="width:${(s.base_stat/200)*100}%"></div></div>
            `).join('');

            updateImage();
        } catch (e) { console.log(e); }
    }

    function updateImage() {
        const img = document.getElementById('poke-img');
        const icon = document.getElementById('shiny-icon');
        if (isShiny) {
            img.src = currentData.sprites.front_shiny || currentData.sprites.front_default;
            icon.style.display = 'block';
            img.style.transform = "scale(1.2)";
        } else {
            img.src = currentData.sprites.other['official-artwork'].front_default;
            icon.style.display = 'none';
            img.style.transform = "scale(1)";
        }
    }

    function toggleShiny() { isShiny = !isShiny; updateImage(); }
    function nav(amt) { curId += amt; if(curId < 1) curId = 1; loadPoke(curId); }
    function randomPoke() { loadPoke(Math.floor(Math.random() * 1000) + 1); }
    
    function speak() {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(`${currentData.name}. ${description}`);
        utter.pitch = 0.8; // Deep robotic voice
        utter.rate = 1;
        window.speechSynthesis.speak(utter);
    }

    // Load Charizard to start
    loadPoke(6);
</script>

</body>
</html>
